<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post a Task</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">
    <section class="form-card">
      <div class="brand">
  <img src="assets/Pasted image.png" alt="TASKILI logo" class="brand-logo" />
</div>

      <h1>Post a Task</h1>
      <p class="subtitle">Enter your information and your task details below</p>

      <form class="task-form">
        <div class="field">
          <label>Task Title</label>
          <input type="text" placeholder="Enter your task title" />
        </div>

        <div class="field">
          <label>Phone Number</label>
          <input type="text" placeholder="Enter your phone number" />
        </div>

        <div class="field">
          <label>Wilaya</label>
          <input type="text" placeholder="Enter your wilaya" />
        </div>

        <div class="field">
          <label>City</label>
          <input type="text" placeholder="Enter your city" />
        </div>

        <div class="field">
          <label>Category</label>
          <input type="text" placeholder="Enter the task category" />
        </div>

        <div class="field">
          <label>Description</label>
          <input type="text" placeholder="Enter the task description" />
        </div>

        <button type="button" class="btn" onclick="goToPayment()">Next to payment</button>
      </form>
    </section>

    <aside class="blue-panel"></aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
