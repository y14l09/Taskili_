<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Details</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #fff;
      color: #111;
    }

    .topbar {
      background: #234aa8;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: 700;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 22px 40px;
    }

    .card {
      border: 1px solid #e1e1e1;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .row {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr;
      gap: 24px;
    }

    .category {
      color: #a5a5a5;
      font-size: 16px;
      text-align: right;
    }

    h2 {
      font-size: 28px;
      margin: 10px 0 16px;
      color: #111;
    }

    .desc {
      font-size: 17px;
      line-height: 1.65;
      color: #444;
      margin-bottom: 18px;
      white-space: pre-line;
    }

    .meta {
      color: #777;
      font-size: 16px;
      margin-top: 10px;
    }

    .side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
    }

    .price-label {
      color: #234aa8;
      font-size: 20px;
      font-weight: 700;
      margin-top: 36px;
    }

    .price {
      font-size: 20px;
      color: #222;
      margin-top: 12px;
    }

    .btn {
      border: none;
      background: #234aa8;
      color: #fff;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      min-width: 180px;
    }

    .btn:hover {
      background: #1f4194;
    }

    .btn.cancel {
      background: #d9534f;
    }

    .btn.cancel:hover {
      background: #c64541;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-top: 22px;
    }

    .applied-box {
      margin-top: 22px;
      background: #eef4ff;
      border-left: 4px solid #234aa8;
      padding: 14px 16px;
      border-radius: 10px;
      color: #234aa8;
      font-weight: 700;
      display: none;
    }

    .applied-box.show {
      display: block;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      color: #234aa8;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .row {
        grid-template-columns: 1fr;
      }

      .side {
        align-items: flex-start;
      }

      .category {
        text-align: left;
      }

      .btn-row {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">Task Details</div>

  <div class="wrap">
    <a class="back" href="find.html">← Back to tasks</a>

    <div class="card">
      <div class="row">
        <div>
          <div class="category" id="category"></div>
          <h2 id="title"></h2>
          <div class="desc" id="desc"></div>
          <div class="meta" id="location"></div>
          <div class="meta" id="date"></div>
        </div>

        <div class="side">
          <div style="text-align:right;">
            <div class="price-label">The Price</div>
            <div class="price" id="price"></div>
          </div>

          <div>
            <div class="btn-row">
              <button id="applyBtn" class="btn">Apply</button>
              <button id="cancelBtn" class="btn cancel" style="display:none;">Cancel application</button>
            </div>
            <div id="appliedBox" class="applied-box">You applied successfully.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const tasks = [
      {
        id: 1,
        category: "Health Care",
        title: "Looking for a nurse",
        desc: "I have a sick mother at home and i am looking for a nurse to come and check on her health every Sunday for a month until she get well .",
        location: "Alger , Hydra .",
        price: "3000 DA / session",
        date: "04/19/2026"
      },
      {
        id: 2,
        category: "Education",
        title: "Looking for a teacher",
        desc: "I am looking for a teacher to teach mathematics to my 10 years old child , he’s a little bit weak in this module and needs some support .",
        location: "Mostaganem , Kharouba.",
        price: "1500 DA / session",
        date: "04/18/2026"
      },
      {
        id: 3,
        category: "House",
        title: "Looking for a plumber",
        desc: "I urgently looking for a plumber , there’s something wrong with my sink it’s been two days , the water is going everywhere in the kitchen .",
        location: "Medea , Ouamri .",
        price: "1000 DA / session",
        date: "04/17/2026"
      }
    ];

    const params = new URLSearchParams(location.search);
    const id = Number(params.get("id"));
    const task = tasks.find(t => t.id === id) || tasks[0];

    const appliedTasks = JSON.parse(localStorage.getItem("appliedTasks") || "[]");

    const category = document.getElementById("category");
    const title = document.getElementById("title");
    const desc = document.getElementById("desc");
    const locationEl = document.getElementById("location");
    const dateEl = document.getElementById("date");
    const price = document.getElementById("price");
    const applyBtn = document.getElementById("applyBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const appliedBox = document.getElementById("appliedBox");

    function saveApplied() {
      localStorage.setItem("appliedTasks", JSON.stringify(appliedTasks));
    }

    function refreshUI() {
      const applied = appliedTasks.includes(task.id);
      appliedBox.classList.toggle("show", applied);
      applyBtn.style.display = applied ? "none" : "inline-block";
      cancelBtn.style.display = applied ? "inline-block" : "none";
    }

    category.textContent = task.category;
    title.textContent = task.title;
    desc.textContent = task.desc;
    locationEl.textContent = task.location;
    dateEl.textContent = `Date: ${task.date}`;
    price.textContent = task.price;

    applyBtn.addEventListener("click", () => {
      if (!appliedTasks.includes(task.id)) {
        appliedTasks.push(task.id);
        saveApplied();
        alert("You applied successfully.");
        refreshUI();
      }
    });

    cancelBtn.addEventListener("click", () => {
      const ok = confirm("Cancel your application?");
      if (ok) {
        const index = appliedTasks.indexOf(task.id);
        if (index !== -1) appliedTasks.splice(index, 1);
        saveApplied();
        refreshUI();
      }
    });

    refreshUI();
  </script>
</body>
</html>
