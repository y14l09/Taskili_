<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">
    <section class="form-card">
      <div class="brand">
  <img src="assets/Pasted image.png" alt="TASKILI logo" class="brand-logo" />
  
</div>
      <h1>Post a Task</h1>
      <p class="subtitle">Enter your information and your task details below</p>

      <form class="task-form">
        <div class="field">
          <label>Price</label>
          <input type="text" placeholder="Enter your task payment" />
        </div>

        <div class="field">
          <label>Per</label>
          <input type="text" placeholder="ex: /session" />
        </div>

        <div class="field">
          <label>Payment Method</label>
          <input type="text" placeholder="Enter your payment method" />
        </div>

        <button type="button" class="btn">Post the task</button>
      </form>
    </section>

    <aside class="blue-panel"></aside>
  </div>
</body>
</html>
